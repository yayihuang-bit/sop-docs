site_name: SOP 文件
site_url: https://yayihuang-bit.github.io/sop-docs/
theme:
  name: material
  language: zh
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight
  custom_dir: overrides

plugins:
  - search:
      lang: zh

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - 首頁: index.md
  - 遊戲上線 SOP: 遊戲上線SOP.md
  - 競品優化:
    - 使用指南: 競品優化_使用指南.html
    - 管理者指南: 競品優化_管理者指南.html
  - 營運用系統教學:
    - 索引: 營運_索引.md
    - 自動發布指南: 營運_自動發布指南.html
    - 文件生成指南: 營運_文件生成指南.html
    - 推播教學: 營運_推播教學.html
