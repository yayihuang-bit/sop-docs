<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>營運活動自動化系統 — 使用說明</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(135deg, #f0f4ff 0%, #fafafa 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .landing {
    text-align: center;
    padding: 60px 40px;
    max-width: 1000px;
    width: 100%;
  }
  .landing h1 {
    font-size: 36px;
    font-weight: 700;
    color: #202124;
    margin-bottom: 12px;
    letter-spacing: -.5px;
  }
  .landing .subtitle {
    color: #5f6368;
    font-size: 17px;
    margin-bottom: 60px;
  }
  .cards {
    display: flex;
    gap: 36px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .card {
    background: #fff;
    border: 2px solid #e0e0e0;
    border-radius: 20px;
    padding: 56px 48px;
    text-align: center;
    cursor: pointer;
    text-decoration: none;
    color: #202124;
    flex: 1;
    min-width: 320px;
    max-width: 420px;
    transition: border-color .2s, box-shadow .25s, transform .18s;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .card:hover {
    border-color: #1a73e8;
    box-shadow: 0 8px 36px rgba(26,115,232,.18);
    transform: translateY(-5px);
  }
  .card .icon { font-size: 64px; margin-bottom: 20px; }
  .card h2 { font-size: 24px; font-weight: 700; color: #1a73e8; margin-bottom: 12px; }
  .card p { font-size: 16px; color: #5f6368; line-height: 1.7; }
  .card .tag {
    display: inline-block;
    margin-top: 24px;
    padding: 6px 16px;
    border-radius: 16px;
    font-size: 13px;
    font-weight: 600;
    background: #e8f0fe;
    color: #1a73e8;
  }
</style>
</head>
<body>
<div class="landing">
  <h1>
    <img src="https://media3.giphy.com/media/KOrIxsEQaBJcHgiiqL/giphy.gif" width="60" style="vertical-align:middle;margin-right:10px;border:none;">
    營運活動自動化系統
    <img src="https://media3.giphy.com/media/KOrIxsEQaBJcHgiiqL/giphy.gif" width="60" style="vertical-align:middle;margin-left:10px;border:none;">
  </h1>
  <p class="subtitle">請選擇要查看的使用指南</p>

  <div class="cards">
    <a class="card" href="參考文件/自動發布指南.html">
      <div class="icon">🚀</div>
      <h2>營運活動自動發布教學</h2>
      <p>讓系統自動設定活動文章</p>
      <span class="tag">auto-post 系統</span>
    </a>
    <a class="card" href="參考文件/文件生成指南.html">
      <div class="icon">📄</div>
      <h2>活動文件生成教學</h2>
      <p>製作範本／套入範本生成活動文件</p>
      <span class="tag">文件生成系統</span>
    </a>
    <a class="card" href="推播/使用指南.html">
      <div class="icon">📣</div>
      <h2>推播教學</h2>
      <p>自動發送推播／追蹤成效</p>
      <span class="tag">推播系統</span>
    </a>
  </div>
</div>
</body>
</html>
