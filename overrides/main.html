{% extends "base.html" %}

{% block content %}
  {{ super() }}
{% endblock %}

{% block styles %}
  {{ super() }}
  <style>
    .md-sidebar--primary {
      width: 380px !important;
    }
    .md-content__inner {
      max-width: none !important;
    }
    .md-typeset {
      max-width: none !important;
    }
    @media (max-width: 1024px) {
      .md-sidebar--primary {
        display: none !important;
      }
      .md-content {
        margin-left: 0 !important;
      }
    }
  </style>
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script>
    function initPasswordProtection(){
      if (localStorage.getItem('sop_authenticated') !== 'true') {
        var overlay = document.createElement('div');
        overlay.id = 'pwd-overlay';
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:10001;display:flex;align-items:center;justify-content:center;';

        var box = document.createElement('div');
        box.style.cssText = 'background:white;padding:40px;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,0.3);text-align:center;';

        box.innerHTML = '<h2 style="margin:0 0 20px 0;color:#333;">需要密碼</h2><input id="pwd-input" type="password" placeholder="請輸入密碼" style="padding:10px;font-size:16px;width:200px;border:1px solid #ccc;border-radius:4px;"><button style="margin-left:10px;padding:10px 20px;background:#007bff;color:white;border:none;border-radius:4px;cursor:pointer;font-size:16px;">確認</button>';

        overlay.appendChild(box);
        document.body.appendChild(overlay);

        var pwdInput = document.getElementById('pwd-input');
        pwdInput.focus();

        function checkPwd(){
          if(pwdInput.value === 'asd12345'){
            localStorage.setItem('sop_authenticated', 'true');
            overlay.remove();
            initFlyGif();
          } else {
            alert('密碼錯誤');
            pwdInput.value = '';
            pwdInput.focus();
          }
        }

        box.querySelector('button').onclick = checkPwd;
        pwdInput.onkeypress = function(e){ if(e.key === 'Enter') checkPwd(); };
      } else {
        initFlyGif();
      }
    }

    var FLY_GIFS = [
      'https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExb3Btc3FseWdtNmhueTl0Ym5xcnN6dzI0NWxpaXJmbWk1YWt4NXc4dCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/TucOQxQkfvRhY3TiwT/giphy.gif',
      'https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExYTk2OThsY2JpcTlkdDZvdHdnbzY0ODg4NmlwMzFjZW9ydXR6amxqdiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cQmpHM5Rh64iGDQB75/giphy.gif',
      'https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExbzB2aHl5M3ZpNDJrZGZyYWJndW44ajc3aHVqaTI5bnI2ODAwcmp1YiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/2l8BqseoXKPUQMjezi/giphy.gif',
      'https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExcTl6Y3FicmNqMDZ3Znp0Mm01MnJ3OXRlb3g5emh5MTN1ZTZkdzVqZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/UpxdwjZ5kXyJcTnbq0/giphy.gif',
      'https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExZzNubXN1YXgzeDE4d2tuZ3J0eXl5enkwZjNtNHg1cjVhdmtmZjJsdCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/HLZuyghzXHvbAvUSwr/giphy.gif',
      'https://media3.giphy.com/media/KOrIxsEQaBJcHgiiqL/giphy.gif'
    ];
    var FLY_MAX = 1;
    var _flyCount = 0;
    var _flyScheduleTimeout = null;

    FLY_GIFS.forEach(function(u){ new Image().src = u; });

    function initFlyGif() {

      function triggerFlyGif(){
        if(_flyCount >= FLY_MAX) return;
        _flyCount++;
        var gif = FLY_GIFS[Math.floor(Math.random() * FLY_GIFS.length)];
        var topPct = (5 + Math.random() * 85) + '%';
        var dur = (2.5 + Math.random() * 5).toFixed(1) + 's';
        var size = (100 + Math.random() * 180) + 'px';
        var el = document.createElement('img');
        el.src = gif;
        var startTop = parseFloat(topPct);
        el.style.cssText = 'position:fixed;right:-200px;top:'+topPct+';width:'+size+';height:auto;z-index:500;pointer-events:all;cursor:grab;border:none;outline:none;box-shadow:none;background:transparent;';
        document.body.appendChild(el);
        var _durMs = parseFloat(dur) * 1000;
        var _startTime = Date.now();
        var _waveAmp = 8 + Math.random() * 12;
        var _waveFreq = 1.5 + Math.random() * 2;
        var _flyRaf = null;
        var _dragging = false;
        function animateFly(){
          if(_dragging){ _flyRaf = requestAnimationFrame(animateFly); return; }
          var elapsed = Date.now() - _startTime;
          var progress = elapsed / _durMs;
          if(progress >= 1){
            if(el.parentNode){el.parentNode.removeChild(el); _flyCount--;}
            scheduleFlyGif();
            return;
          }
          var x = (1 - progress) * (window.innerWidth + 200) - 200;
          el.style.right = 'auto';
          el.style.left = x + 'px';
          var topVal = startTop + Math.sin(progress * Math.PI * 2 * _waveFreq) * _waveAmp;
          el.style.top = topVal + '%';
          _flyRaf = requestAnimationFrame(animateFly);
        }
        el.onmousedown = function(){ _dragging = true; };
        el.onmouseup = function(){ _dragging = false; };
        el.onmouseleave = function(){ _dragging = false; };
        animateFly();
      }

      function scheduleFlyGif(){
        if(document.hidden) return;
        if(_flyScheduleTimeout) clearTimeout(_flyScheduleTimeout);
        _flyScheduleTimeout = setTimeout(function(){
          if(!document.hidden){
            triggerFlyGif();
          }
        }, (30 + Math.random() * 60) * 1000);
      }

      document.addEventListener('visibilitychange', function(){
        if(document.hidden){
          if(_flyScheduleTimeout) clearTimeout(_flyScheduleTimeout);
        } else {
          scheduleFlyGif();
        }
      });

      if(!/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) && window.innerWidth >= 1024){
        scheduleFlyGif();
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPasswordProtection);
    } else {
      initPasswordProtection();
    }
  </script>
{% endblock %}
